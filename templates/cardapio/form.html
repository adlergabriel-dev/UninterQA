{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="header-actions">
        <div>
            <h2>{{ "Editar Item do Cardápio" if cardapio and cardapio.get('id') else "Novo Item do Cardápio" }}</h2>
            <p style="color:#666; margin: 0;">
                Relacione produtos às unidades e configure disponibilidade, preço e destaque.
            </p>
        </div>
    </div>

    <form method="POST">
        <div class="filtros-grid">
            <div class="form-group">
                <label>Unidade</label>
                <select name="unidade_id" required>
                    <option value="">Selecione</option>
                    {% for unidade in unidades %}
                        <option value="{{ unidade.id }}"
                            {% if cardapio and cardapio.get('unidade_id') == unidade.id %}selected{% endif %}>
                            {{ unidade.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Produto</label>
                <select name="produto_id" required>
                    <option value="">Selecione</option>
                    {% for produto in produtos %}
                        <option value="{{ produto.id }}"
                            {% if cardapio and cardapio.get('produto_id') == produto.id %}selected{% endif %}>
                            {{ produto.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Preço de Venda</label>
                <input type="text" name="preco_venda" value="{{ cardapio.preco_venda if cardapio else '' }}" required>
            </div>

            <div class="form-group">
                <label>Ordem de Exibição</label>
                <input type="number" name="ordem_exibicao" value="{{ cardapio.ordem_exibicao if cardapio else 0 }}">
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h3 style="margin-bottom: 16px;">Configurações</h3>

            <div class="filtros-grid">
                <div class="form-group">
                    <label style="display:flex; align-items:center; gap:10px; margin-bottom:0;">
                        <input type="checkbox" name="disponivel"
                            {% if not cardapio or cardapio.get('disponivel') %}checked{% endif %}>
                        Disponível
                    </label>
                </div>

                <div class="form-group">
                    <label style="display:flex; align-items:center; gap:10px; margin-bottom:0;">
                        <input type="checkbox" name="destaque"
                            {% if cardapio and cardapio.get('destaque') %}checked{% endif %}>
                        Destaque
                    </label>
                </div>
            </div>
        </div>

        <div class="filtros-acoes">
            <button type="submit">Salvar</button>
            <a class="btn btn-secondary" href="{{ url_for('cardapio.lista') }}">Voltar</a>
        </div>
    </form>
</div>
{% endblock %}
